<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Casa Monarca</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            background: white;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .logo h1 {
            color: #1a5276;
            font-size: 1.4rem;
            font-weight: 700;
        }

        .logo p {
            color: #666;
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .divider {
            border: none;
            border-top: 1px solid #e0e0e0;
            margin: 1rem 0 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #1a5276;
        }

        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: #1a5276;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s;
        }

        .btn-login:hover { background: #154360; }

        .messages { margin-bottom: 1rem; }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            background: #fdecea;
            color: #c0392b;
            border-left: 4px solid #c0392b;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="logo">
        <h1>🦋 Casa Monarca</h1>
        <p>Ayuda Humanitaria al Migrante</p>
    </div>
    <hr class="divider">

    {% if messages %}
    <div class="messages">
        {% for message in messages %}
        <div class="alert">{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Usuario</label>
            {{ form.username }}
        </div>
        <div class="form-group">
            <label for="id_password">Contraseña</label>
            {{ form.password }}
        </div>
        <button type="submit" class="btn-login">Iniciar sesión</button>
    </form>
</div>
</body>
</html>
